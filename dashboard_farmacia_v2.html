<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Analítico – Farmácia BI</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* ── Reset & Base ─────────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif;font-size:13px;color:#1e293b;background:#f1f5f9}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#e2e8f0}
::-webkit-scrollbar-thumb{background:#94a3b8;border-radius:3px}

/* ── Layout ───────────────────────────────────────────────────── */
body{display:flex;flex-direction:column;height:100vh;overflow:hidden}
#app{display:flex;flex:1;overflow:hidden}
header{display:flex;align-items:center;justify-content:space-between;padding:6px 14px;background:#fff;border-bottom:1px solid #e2e8f0;flex-shrink:0;gap:10px}
aside{width:158px;background:#111827;flex-shrink:0;display:flex;flex-direction:column;padding:8px 6px;overflow-y:auto}
main{flex:1;overflow-y:auto;padding:12px;background:#f1f5f9;position:relative}

/* ── Colors ───────────────────────────────────────────────────── */
:root{
  --amber:#f59e0b;--amber-dk:#d97706;--amber-lt:#fef3c7;
  --navy:#1e3a5f;--green:#16a34a;--red:#dc2626;
  --card:#fff;--border:rgba(251,191,36,.2);
}

/* ── Cards ────────────────────────────────────────────────────── */
.card{background:var(--card);border-radius:9px;border:1px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,.07)}
.card-hover{transition:transform .15s,box-shadow .15s;cursor:default}
.card-hover:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,.12)}

/* ── KPI row ──────────────────────────────────────────────────── */
#kpi-container{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:10px}
.kpi-card{padding:12px 14px;display:flex;flex-direction:column;gap:4px;border-left:4px solid var(--amber)}
.kpi-card.navy{border-left-color:var(--navy)}
.kpi-card.green{border-left-color:var(--green)}
.kpi-card.red{border-left-color:var(--red)}
.kpi-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:2px}
.kpi-icon{font-size:18px;color:#d1d5db}
.kpi-val{font-size:19px;font-weight:700;color:#1e293b;line-height:1.1}
.kpi-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:#64748b}
.kpi-prev{font-size:9px;color:#94a3b8;margin-top:4px;border-top:1px solid #f1f5f9;padding-top:4px}

/* ── Delta badges ─────────────────────────────────────────────── */
.up{color:var(--green);font-weight:700;font-size:10px}
.dn{color:var(--red);font-weight:700;font-size:10px}
.nt{color:#64748b;font-size:10px}

/* ── Header filter buttons ────────────────────────────────────── */
.hdr-group{display:flex;flex-direction:column;gap:3px}
.hdr-group label{font-size:9px;color:#94a3b8;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.hdr-btns{display:flex;gap:3px;flex-wrap:wrap}
.pbi-btn{padding:3px 10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;cursor:pointer;border-radius:4px;border:1px solid var(--amber-dk);background:linear-gradient(to bottom,#fbbf24,#f59e0b);color:#1f2937;transition:all .15s}
.pbi-btn:hover{background:#fcd34d}
.pbi-btn.active{background:#1e3a5f;color:#fbbf24;border-color:#1e3a5f}
.pbi-btn.has-data{box-shadow:inset 0 0 0 2px rgba(22,163,74,.45)}

/* ── Sync info ────────────────────────────────────────────────── */
#sync-area{display:flex;flex-direction:column;align-items:flex-end;font-size:9px;color:#64748b;gap:1px}
.btn-refresh{padding:4px 10px;font-size:10px;font-weight:700;cursor:pointer;border-radius:4px;border:1px solid #e2e8f0;background:#fff;display:flex;align-items:center;gap:5px;transition:background .15s}
.btn-refresh:hover{background:#f8fafc}

/* ── Sidebar buttons ──────────────────────────────────────────── */
.sidebar-label{font-size:8px;color:#4b5563;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:4px 8px 2px}
.sb-btn{display:block;width:100%;text-align:left;padding:8px 10px;font-size:10px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.04em;background:transparent;border:none;border-left:3px solid transparent;margin-bottom:1px;cursor:pointer;transition:all .15s}
.sb-btn:hover{background:#374151;color:#e5e7eb}
.sb-btn.active{background:linear-gradient(90deg,#374151,#1f2937);color:#fbbf24;border-left-color:#fbbf24}
.sb-btn i{margin-right:4px;width:12px}

/* ── Loader ───────────────────────────────────────────────────── */
#loading-indicator{position:absolute;inset:0;background:rgba(241,245,249,.88);backdrop-filter:blur(4px);z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px}
.loader{width:36px;height:36px;border:3px solid #e2e8f0;border-left-color:var(--amber);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading-text{font-weight:700;font-size:13px;color:var(--navy)}
#debug-log{font-size:9px;color:#94a3b8;background:rgba(255,255,255,.6);padding:6px;border-radius:6px;max-width:320px;max-height:100px;overflow-y:auto;font-family:monospace}

/* ── Grid helpers ─────────────────────────────────────────────── */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid-3{display:grid;grid-template-columns:2fr 1fr;gap:10px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.grid-6{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
.flex-col{display:flex;flex-direction:column;gap:10px}
.chart-wrap{position:relative;flex:1;min-height:0}

/* ── Charts wrapper ───────────────────────────────────────────── */
.chart-card{padding:12px;display:flex;flex-direction:column}
.chart-card h3{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:#64748b;border-bottom:1px solid #f1f5f9;padding-bottom:6px;margin-bottom:8px}
.chart-card h3 i{color:var(--amber);margin-right:4px}
.chart-inner{position:relative;height:230px}
.chart-inner-sm{position:relative;height:190px}

/* ── Tables ───────────────────────────────────────────────────── */
.tbl-wrap{overflow-x:auto;border:1px solid #e2e8f0;border-radius:8px;margin-top:8px}
table{width:100%;border-collapse:collapse;font-size:11px}
thead{background:var(--navy)}
thead th{padding:7px 10px;color:#fff;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;white-space:nowrap}
tbody td{padding:5px 10px;border-bottom:1px solid #f8fafc}
tbody tr:hover td{background:#fffbeb}
.tr-total td{background:#f8fafc!important;font-weight:700}
.tr-dim td{opacity:.3}
.td-r{text-align:right}
.td-c{text-align:center}
.th-r{text-align:right}
.th-c{text-align:center}
.td-mono{font-family:monospace;color:#94a3b8;font-size:9px}
.td-curr{background:#fffde7!important;font-weight:700}
.th-curr{background:#d97706!important}

/* ── Section header ───────────────────────────────────────────── */
.section-hdr{font-size:15px;font-weight:800;color:var(--navy);display:flex;align-items:center;gap:8px;margin-bottom:10px}
.section-hdr i{color:var(--amber)}

/* ── KPI detail block ─────────────────────────────────────────── */
.kpi-detail{padding:14px;display:flex;flex-direction:column;gap:6px}
.kpi-detail .icon-row{display:flex;justify-content:space-between;align-items:flex-start}
.kpi-detail .val{font-size:24px;font-weight:700;color:#1e293b;line-height:1.1}
.kpi-detail .lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:#64748b}

/* ── Margin helpers ───────────────────────────────────────────── */
.mb8{margin-bottom:8px}
.mb12{margin-bottom:12px}
.mt8{margin-top:8px}
.mt4{margin-top:4px}

/* ── Sidebar separator ────────────────────────────────────────── */
.sb-sep{flex:1}
.sb-divider{border-top:1px solid #374151;margin:6px 0}

/* ── Info pill ────────────────────────────────────────────────── */
.info-pill{font-size:9px;color:#64748b;background:#f8fafc;border:1px solid #e2e8f0;border-radius:4px;padding:4px 8px;margin-bottom:10px}


/* ── Escala styles ────────────────────────────────────────────── */
.escala-day-card{padding:10px 14px;border-radius:8px;border:1px solid #e2e8f0;background:#fff;margin-bottom:8px}
.escala-day-card.alerta{border-left:4px solid #dc2626;background:#fff5f5}
.escala-day-card.ok{border-left:4px solid #16a34a;background:#f0fdf4}
.escala-day-card.folga{border-left:4px solid #94a3b8;background:#f8fafc;opacity:.65}
.badge-turno{display:inline-block;padding:2px 8px;border-radius:10px;font-size:9px;font-weight:700;text-transform:uppercase;margin-right:4px;margin-bottom:4px}
.badge-r{background:#dbeafe;color:#1d4ed8}
.badge-24{background:#fef9c3;color:#854d0e}
.badge-alerta{background:#fee2e2;color:#991b1b;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.escala-nome{font-size:11px;font-weight:600;color:#1e293b}
.escala-cargo{font-size:9px;color:#64748b;margin-left:8px}
.alert-banner{background:#fef2f2;border:1px solid #fca5a5;border-radius:8px;padding:10px 14px;margin-bottom:10px;display:flex;align-items:flex-start;gap:8px;font-size:11px;color:#991b1b;font-weight:600}
.ok-banner{background:#f0fdf4;border:1px solid #86efac;border-radius:8px;padding:10px 14px;margin-bottom:10px;font-size:11px;color:#166534;font-weight:600;display:flex;align-items:center;gap:8px}

@media(max-width:900px){
  #kpi-container{grid-template-columns:repeat(2,1fr)}
  .grid-3,.grid-2{grid-template-columns:1fr}
  .grid-4{grid-template-columns:repeat(2,1fr)}
  aside{width:120px}
}
</style>
</head>
<body>

<!-- ═══ HEADER ═══════════════════════════════════════════════════ -->
<header>
  <!-- Logo -->
  <div style="width:160px;flex-shrink:0">
    <img src="/img-uploads/DOIT2.png" alt="DOIT BI" style="height:36px;object-fit:contain"
      onerror="this.outerHTML='<b style=\'font-size:16px;color:#1e3a5f\'>DOIT <span style=\'color:#f59e0b\'>BI</span> <i class=\'fa fa-chart-pie\'></i></b>'">
  </div>

  <!-- Filtros -->
  <div style="display:flex;gap:18px;align-items:center;flex:1;justify-content:center">
    <div class="hdr-group">
      <label>Mês de Referência</label>
      <div class="hdr-btns" id="month-filters"></div>
    </div>
    <div class="hdr-group" style="border-left:1px solid #f1f5f9;padding-left:18px">
      <label>Setor / Fonte</label>
      <div class="hdr-btns" id="setores-header-toggles"></div>
    </div>
  </div>

  <!-- Status -->
  <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
    <div id="sync-area">
      <span style="font-weight:700;display:flex;align-items:center;gap:4px">
        <i class="fa fa-circle" id="status-dot" style="font-size:7px;color:#eab308"></i>
        <span id="sync-text">Conectando...</span>
      </span>
      <span>Atualizado: <b id="last-update" style="color:#2563eb">--:--</b></span>
    </div>
    <button class="btn-refresh" onclick="fetchData()">
      <i class="fa fa-rotate" style="color:#2563eb"></i> Atualizar
    </button>
  </div>
</header>

<!-- ═══ APP ═══════════════════════════════════════════════════════ -->
<div id="app">

  <!-- SIDEBAR -->
  <aside>
    <div class="sidebar-label">Painéis</div>
    <button class="sb-btn active" onclick="switchTab('integrated',this)"><i class="fa fa-chart-line"></i>Visão Integrada</button>
    <button class="sb-btn" onclick="switchTab('comparativo',this)"><i class="fa fa-calendar-days"></i>Comparativo Mensal</button>
    <button class="sb-btn" onclick="switchTab('atb',this)"><i class="fa fa-capsules"></i>Indicadores ATB</button>
    <button class="sb-btn" onclick="switchTab('operational',this)"><i class="fa fa-gears"></i>Operacionais</button>
    <button class="sb-btn" onclick="switchTab('prescents',this)"><i class="fa fa-notes-medical"></i>Prescrições / Interv.</button>
    <button class="sb-btn" onclick="switchTab('production',this)"><i class="fa fa-industry"></i>Produção</button>
    <div class="sb-sep"></div>
    <div class="sb-divider"></div>
    <button class="sb-btn" onclick="switchTab('quanti',this)"><i class="fa fa-magnifying-glass-chart"></i>Gestão Quantidade</button>
    <button class="sb-btn" onclick="switchTab('escala',this)" id="btn-escala" style="position:relative">
      <i class="fa fa-users"></i>Escala / Alertas
      <span id="escala-badge" style="display:none;position:absolute;top:6px;right:6px;background:#dc2626;color:#fff;border-radius:50%;width:16px;height:16px;font-size:9px;font-weight:700;line-height:16px;text-align:center;align-items:center;justify-content:center"></span>
    </button>
  </aside>

  <!-- MAIN -->
  <main id="main">
    <div id="loading-indicator">
      <div class="loader"></div>
      <p id="loading-text">Conectando ao Google BI...</p>
      <div id="debug-log"></div>
    </div>

    <div id="dashboard-content" style="display:none;flex-direction:column;gap:10px">

      <!-- KPIs -->
      <div id="kpi-container"></div>

      <!-- Visão Integrada -->
      <div id="tab-integrated">
        <div class="grid-3 mb12">
          <div class="card chart-card" style="min-height:270px">
            <h3><i class="fa fa-chart-line"></i>Evolução — Prescrições vs Tratamentos</h3>
            <div class="chart-inner"><canvas id="lineChart"></canvas></div>
          </div>
          <div class="card chart-card" style="min-height:270px">
            <h3><i class="fa fa-circle-half-stroke"></i>Taxa de Aceitação de Intervenções</h3>
            <div class="chart-inner" style="display:flex;align-items:center;justify-content:center"><canvas id="pieChart"></canvas></div>
          </div>
        </div>
        <div class="grid-2 mb12">
          <div class="card chart-card" style="min-height:220px">
            <h3><i class="fa fa-boxes-stacked" style="color:#3b82f6"></i>Comparativo Multimensal — Produção</h3>
            <div class="chart-inner-sm"><canvas id="barProdChart"></canvas></div>
          </div>
          <div class="card chart-card" style="min-height:220px">
            <h3><i class="fa fa-triangle-exclamation" style="color:#f97316"></i>Alertas Críticos — Mês Selecionado</h3>
            <div class="chart-inner-sm"><canvas id="barErrosChart"></canvas></div>
          </div>
        </div>
      </div>

      <!-- Abas dinâmicas -->
      <div id="tab-details" style="display:none">
        <div id="details-content"></div>
      </div>

      <!-- Ranking -->
      <div class="card" style="padding:12px;margin-bottom:16px">
        <h3 style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:#64748b;border-bottom:1px solid #f1f5f9;padding-bottom:6px;margin-bottom:8px">
          <i class="fa fa-list-ol" style="color:var(--amber)"></i> Ranking de Indicadores
        </h3>
        <div style="overflow-y:auto;max-height:240px">
          <table>
            <thead>
              <tr>
                <th style="width:28px">#</th>
                <th>Indicador</th>
                <th class="th-r">Mês Atual</th>
                <th class="th-r">Mês Anterior</th>
                <th class="th-c">Δ</th>
              </tr>
            </thead>
            <tbody id="table-body"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- ═══════════════════════════════════════════════════════════════ -->
<script>
// ── CONFIG ──────────────────────────────────────────────────────
const SPREADSHEETS = [
  { name:"Emergência",  id:'1E6yzVncrGpUip-i2IUNLKwdOU-A629Mx',              active:true },
  { name:"Pediatria",   id:'1sAFVO_gvo1Gp-t5Cm4z93y95ph1TyFx-',             active:true },
  { name:"Cer Clínico", id:'1bnYkTzMk024_X4SfSOMUaTEZzQ9m5R40kn3X-Yf5Nt8', active:true },
  { name:"CTI",         id:'1i-GOynig9ctDC0_p01kYgUOi1sjRfTVsDlfUQS2hm4U', active:true }
];

const MONTHS = [
  {l:'Jan',n:'01'},{l:'Fev',n:'02'},{l:'Mar',n:'03'},{l:'Abr',n:'04'},
  {l:'Mai',n:'05'},{l:'Jun',n:'06'},{l:'Jul',n:'07'},{l:'Ago',n:'08'},
  {l:'Set',n:'09'},{l:'Out',n:'10'},{l:'Nov',n:'11'},{l:'Dez',n:'12'}
];

// ── STATE ────────────────────────────────────────────────────────
let sheetsLoaded=0, expectedSheets=0, fallbackTimeout;
let consolidatedIndicators={}, allDatesSet=new Set(), charts={};
let currentTab='integrated';
let selMonth='Mar', selMonthNum='03';

// ── INIT ─────────────────────────────────────────────────────────
window.google={visualization:{Query:{setResponse:function(j){handleSheetResponse('gf',j,'matrix');}}}}; 

document.addEventListener('DOMContentLoaded',()=>{
  buildMonthBtns(); buildSetorBtns(); initCharts(); fetchData();
  setInterval(fetchData,60000);
});

function buildMonthBtns(){
  document.getElementById('month-filters').innerHTML = MONTHS.map(m=>
    `<button class="pbi-btn${m.l===selMonth?' active':''}" id="mb${m.n}" onclick="updateMonth('${m.l}','${m.n}',this)">${m.l}</button>`
  ).join('');
}

function buildSetorBtns(){
  document.getElementById('setores-header-toggles').innerHTML = SPREADSHEETS.map((s,i)=>
    `<button class="pbi-btn${s.active?' active':''}" onclick="toggleSheet(${i})">${s.name}</button>`
  ).join('');
}

function markMonthsData(){
  MONTHS.forEach(m=>{
    const btn=document.getElementById('mb'+m.n); if(!btn)return;
    const suf='/'+m.n;
    let has=false;
    for(let k in consolidatedIndicators) for(let d in consolidatedIndicators[k].byDate) if(d.endsWith(suf)){has=true;break;}
    has ? btn.classList.add('has-data') : btn.classList.remove('has-data');
  });
}

function updateMonth(l,n,btn){
  selMonth=l; selMonthNum=n;
  document.querySelectorAll('#month-filters .pbi-btn').forEach(b=>b.classList.remove('active'));
  btn && btn.classList.add('active');
  renderDashboard();
}

function toggleSheet(i){ SPREADSHEETS[i].active=!SPREADSHEETS[i].active; buildSetorBtns(); fetchData(); }

function switchTab(id,btn){
  currentTab=id;
  document.querySelectorAll('.sb-btn').forEach(b=>b.classList.remove('active'));
  btn && btn.classList.add('active');
  renderDashboard();
}

// ── CHART INIT ───────────────────────────────────────────────────
Chart.defaults.color='#64748b';
Chart.defaults.font.family="'Segoe UI',sans-serif";
Chart.defaults.font.size=11;
Chart.defaults.plugins.tooltip.backgroundColor='rgba(255,255,255,.95)';
Chart.defaults.plugins.tooltip.titleColor='#1e293b';
Chart.defaults.plugins.tooltip.bodyColor='#475569';
Chart.defaults.plugins.tooltip.borderColor='#e2e8f0';
Chart.defaults.plugins.tooltip.borderWidth=1;

function initCharts(){
  Object.values(charts).forEach(c=>{try{c.destroy();}catch(e){}});
  const lo={responsive:true,maintainAspectRatio:false};

  charts.line=new Chart(document.getElementById('lineChart').getContext('2d'),{
    type:'line',data:{labels:[],datasets:[]},
    options:{...lo,plugins:{legend:{position:'top',labels:{boxWidth:8,usePointStyle:true,padding:10}}},
      scales:{x:{grid:{display:false},ticks:{maxRotation:45,font:{size:9}}},y:{beginAtZero:true,grid:{color:'#f1f5f9'}}}}
  });
  charts.pie=new Chart(document.getElementById('pieChart').getContext('2d'),{
    type:'doughnut',data:{labels:[],datasets:[]},
    options:{...lo,cutout:'65%',plugins:{legend:{position:'bottom',labels:{boxWidth:8,usePointStyle:true,padding:8}},
      tooltip:{callbacks:{label:c=>{const tot=c.dataset.data.reduce((a,b)=>a+b,0);return ` ${c.label}: ${c.parsed} (${tot>0?((c.parsed/tot)*100).toFixed(1):0}%)`;}}}}}
  });
  charts.barProd=new Chart(document.getElementById('barProdChart').getContext('2d'),{
    type:'bar',data:{labels:[],datasets:[]},
    options:{...lo,plugins:{legend:{position:'top',labels:{boxWidth:8,usePointStyle:true,padding:8}}},
      scales:{x:{grid:{display:false},ticks:{font:{size:9}}},y:{beginAtZero:true,grid:{color:'#f1f5f9'}}}}
  });
  charts.barErros=new Chart(document.getElementById('barErrosChart').getContext('2d'),{
    type:'bar',data:{labels:[],datasets:[]},
    options:{...lo,indexAxis:'y',plugins:{legend:{display:false}},
      scales:{x:{beginAtZero:true,grid:{color:'#f1f5f9'}},y:{grid:{display:false},ticks:{font:{size:9}}}}}
  });
}

// ── STATUS ───────────────────────────────────────────────────────
function setStatus(t,c){document.getElementById('sync-text').innerText=t;document.getElementById('status-dot').style.color=c;}
function logDebug(m){console.log(m);const el=document.getElementById('debug-log');if(el)el.innerHTML+=`<div>${m}</div>`;}

// ── FETCH ────────────────────────────────────────────────────────
function fetchData(){
  document.getElementById('loading-indicator').style.display='flex';
  document.getElementById('dashboard-content').style.display='none';
  document.getElementById('debug-log').innerHTML='';
  setStatus('Sincronizando...','#eab308');
  sheetsLoaded=0; consolidatedIndicators={}; allDatesSet.clear();

  const active=SPREADSHEETS.filter(s=>s.active);
  const extra=["INTERVENÇÕES","COBRANÇA INDEVIDA","SEGUNDO ENVIO"];
  expectedSheets=active.length*(1+extra.length);
  logDebug(`Carregando ${expectedSheets} bases...`);
  if(!expectedSheets){renderDashboard();return;}

  active.forEach(s=>{
    const i=SPREADSHEETS.indexOf(s);
    fetchSheet(s.id,null,'matrix',i+'_main');
    extra.forEach(t=>fetchSheet(s.id,t,'list',i+'_'+t));
  });

  if(fallbackTimeout)clearTimeout(fallbackTimeout);
  fallbackTimeout=setTimeout(()=>{if(sheetsLoaded<expectedSheets){console.warn('Render parcial');renderDashboard();}},10000);
}

function fetchSheet(id,title,type,uid){
  const script=document.createElement('script');
  const cid=uid.replace(/[^a-zA-Z0-9]/g,'');
  const cb='pbi_'+cid;
  window[cb]=function(j){handleSheetResponse(uid,j,type);delete window[cb];};
  let url=`https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:json;responseHandler:${cb}`;
  if(title)url+='&sheet='+encodeURIComponent(title);
  script.src=url; script.id='sc_'+uid;
  script.onerror=()=>{logDebug('Erro: '+id.substring(0,8));handleSheetResponse(uid,null,type);};
  const ex=document.getElementById(script.id); if(ex)ex.remove();
  document.body.appendChild(script);
}

function handleSheetResponse(id,json,type){
  sheetsLoaded++;
  if(json&&json.table&&json.table.rows){
    logDebug(`OK: ${id} (${json.table.rows.length} linhas)`);
    type==='matrix'?parseMatrix(json.table):parseList(json.table);
  } else if(json&&json.status==='error'){
    logDebug(`Erro: ${id} — ${(json.errors[0]&&json.errors[0].message)||'sem acesso'}`);
  }
  if(sheetsLoaded>=expectedSheets)renderDashboard();
}

// ── PARSERS ──────────────────────────────────────────────────────
function parseMatrix(table){
  let dateRow=-1, dateHdrs={};
  for(let r=0;r<Math.min(table.rows.length,35);r++){
    let found=0,pot={};
    for(let c=0;c<table.cols.length;c++){
      const row=table.rows[r]; if(!row||!row.c||!row.c[c])continue;
      const v=String(row.c[c].f||row.c[c].v||'');
      if(v.match(/^\d{1,2}\/\d{1,2}/)){found++;const p=v.split('/');pot[c]=p[0].padStart(2,'0')+'/'+p[1].padStart(2,'0');}
    }
    if(found>=2){dateRow=r;dateHdrs=pot;break;}
  }
  if(dateRow===-1){logDebug('Aviso: sem cabeçalho de data');return;}
  for(let r=dateRow+1;r<table.rows.length;r++){
    const row=table.rows[r]; if(!row.c)continue;
    let nm='';
    if(row.c[1]&&row.c[1].v)nm=String(row.c[1].v).trim();
    else if(row.c[0]&&row.c[0].v)nm=String(row.c[0].v).trim();
    if(!nm)continue;
    for(let c in dateHdrs){
      if(row.c[c]&&row.c[c].v!==null&&row.c[c].v!==undefined){
        const val=Number(row.c[c].v), ddmm=dateHdrs[c];
        allDatesSet.add(ddmm);
        if(!consolidatedIndicators[nm])consolidatedIndicators[nm]={total:0,byDate:{}};
        consolidatedIndicators[nm].total+=val;
        consolidatedIndicators[nm].byDate[ddmm]=(consolidatedIndicators[nm].byDate[ddmm]||0)+val;
      }
    }
  }
}

function parseList(table){
  let hdr=-1;
  for(let i=0;i<Math.min(table.rows.length,10);i++){
    if(table.rows[i].c&&table.rows[i].c[0]&&String(table.rows[i].c[0].v).toLowerCase().includes('data')){hdr=i;break;}
  }
  if(hdr===-1)return;
  const cols={};
  table.cols.forEach((c,idx)=>{
    const v=table.rows[hdr].c[idx]?String(table.rows[hdr].c[idx].v).toUpperCase():''; cols[v]=idx;
  });
  for(let r=hdr+1;r<table.rows.length;r++){
    const row=table.rows[r]; if(!row.c||!row.c[0]||!row.c[0].v)continue;
    const dm=String(row.c[0].f||row.c[0].v||'').match(/^(\d{1,2})\/(\d{1,2})/);
    if(!dm)continue;
    const ddmm=dm[1].padStart(2,'0')+'/'+dm[2].padStart(2,'0'); allDatesSet.add(ddmm);
    if(cols['INTERV. ACEITA']!==undefined){
      const a=String((row.c[cols['INTERV. ACEITA']]||{}).v||'').toLowerCase();
      incr('Intervenções Propostas',ddmm);
      if(a==='sim'||a==='s')incr('Intervenções Aceitas',ddmm);
    }
    if(cols['SEGUNDO ENVIO FEITO']!==undefined){
      const s=String((row.c[cols['SEGUNDO ENVIO FEITO']]||{}).v||'').toLowerCase();
      incr('Cobrança - Alerta de Erro',ddmm);
      if(s==='sim'||s==='s')incr('Segundo Envio Realizado',ddmm);
    }
    if(cols['ENFERMEIRA']!==undefined&&cols['INTERV. ACEITA']===undefined) incr('Cobrança Indevida Detectada',ddmm);
  }
}

function incr(nm,date){
  if(!consolidatedIndicators[nm])consolidatedIndicators[nm]={total:0,byDate:{}};
  consolidatedIndicators[nm].total++;
  consolidatedIndicators[nm].byDate[date]=(consolidatedIndicators[nm].byDate[date]||0)+1;
}

// ── SOMA HELPERS ─────────────────────────────────────────────────
function msum(kw,mnum){
  let s=0; const kl=kw.toLowerCase(), sf=mnum?'/'+String(mnum).padStart(2,'0'):null;
  for(let k in consolidatedIndicators){
    if(!k.toLowerCase().includes(kl))continue;
    if(!sf){s+=consolidatedIndicators[k].total;}
    else{for(let d in consolidatedIndicators[k].byDate)if(d.endsWith(sf))s+=consolidatedIndicators[k].byDate[d];}
  }
  return s;
}
function getM(kw){return msum(kw,selMonthNum);}
function getPrev(){const c=parseInt(selMonthNum,10);return c>1?String(c-1).padStart(2,'0'):'12';}
function prevLabel(){return MONTHS.find(m=>m.n===getPrev())?.l||'—';}

// Formatos
function f(n,d=0){return Number(n).toLocaleString('pt-BR',{maximumFractionDigits:d});}
function fc(n){return Number(n).toLocaleString('pt-BR',{style:'currency',currency:'BRL',maximumFractionDigits:0});}

function delta(curr,prev){
  if(!prev||prev===0)return '<span class="nt">—</span>';
  const p=((curr-prev)/prev*100); const s=p>=0?'+':''; const cls=p>0?'up':p<0?'dn':'nt'; const ic=p>0?'↑':p<0?'↓':'→';
  return `<span class="${cls}">${ic} ${s}${p.toFixed(1)}%</span>`;
}

function availMonths(){
  return MONTHS.filter(m=>{const sf='/'+m.n; for(let k in consolidatedIndicators) for(let d in consolidatedIndicators[k].byDate) if(d.endsWith(sf))return true; return false;});
}

  // Calcular médias para linha de referência
  const avgPresc = dsPresc.length > 0 ? dsPresc.reduce((a,b)=>a+b,0)/dsPresc.length : 0;

    {label:'Tratamentos',data:dsTrat,borderColor:'#f59e0b',backgroundColor:'rgba(245,158,11,.07)',borderWidth:2,pointRadius:1.5,fill:true,tension:.3,borderDash:[5,4]},
    {label:`Média Tratamentos (${avgTrat.toFixed(0)}/dia)`,data:mTrat,borderColor:'#f59e0b',borderWidth:1.5,borderDash:[6,3],pointRadius:0,fill:false,tension:0}

  charts.barProd.data.labels=am.map(m=>m.l);

    {label:'Itens Dispensados',data:am.map(m=>msum('qt de itens dispen',m.n)),backgroundColor:am.map(m=>m.n===selMonthNum?'#1e3a5f':'#93c5fd'),borderRadius:3},

  ];
  charts.barProd.update();

  // Bar erros
  const eL=[],eD=[];

  charts.barErros.data.labels=eL;
  charts.barErros.data.datasets=[{data:eD,backgroundColor:'#f97316',borderRadius:3}];
  charts.barErros.update();
}

  const ctx=document.getElementById('prodTabChart'); if(!ctx)return;
  const am=availMonths();
  new Chart(ctx,{type:'bar',data:{labels:am.map(m=>m.l),datasets:[{label:'R$ Dispensado',data:am.map(m=>msum('r$ valor dispensado',m.n)),backgroundColor:am.map(m=>m.n===selMonthNum?'#f59e0b':'#d1d5db'),borderRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},title:{display:true,text:'Comparativo Mensal de Produção (R$)',font:{size:11,weight:'bold'}}},scales:{x:{grid:{display:false}},y:{beginAtZero:true,ticks:{callback:v=>'R$ '+f(v,0)}}}}});
}

// ── MONTHLY TABLE ────────────────────────────────────────────────
function monthTable(kpis, title){
  const m=parseInt(selMonthNum,10);
  const days=m===2?28:([4,6,9,11].includes(m)?30:31);
  let totals=new Array(kpis.length).fill(0), rows='';
  for(let d=1;d<=days;d++){
    const ds=String(d).padStart(2,'0')+'/'+String(m).padStart(2,'0');
    let any=false, cells='';
    kpis.forEach((k,idx)=>{
      let v=0;
      for(let key in consolidatedIndicators) if(key.toLowerCase().includes(k.t.toLowerCase())) v+=(consolidatedIndicators[key].byDate[ds]||0);
      totals[idx]+=v; if(v>0)any=true;
      cells+=`<td class="td-r">${v>0?(k.money?fc(Math.round(v)):f(v)):''}</td>`;
    });
    rows+=`<tr class="${any?'':'tr-dim'}"><td class="td-mono">${ds}</td>${cells}</tr>`;
  }
  return `<div class="tbl-wrap"><table><thead>${title?`<tr><th colspan="${kpis.length+1}" class="td-c">${title}</th></tr>`:''}<tr><th style="min-width:50px">Data</th>${kpis.map(k=>`<th class="th-r">${k.l}</th>`).join('')}</tr></thead><tbody>${rows}<tr class="tr-total"><td>TOTAL</td>${totals.map((t,i)=>`<td class="td-r">${kpis[i].money?fc(Math.round(t)):f(t,1)}</td>`).join('')}</tr></tbody></table></div>`;
}

// ── UI HELPERS ───────────────────────────────────────────────────
function sHdr(icon,title){return `<div class="section-hdr mb12"><i class="fa-solid ${icon}"></i>${title}</div>`;}
function kdb(title,val,prevVal,dlt,icon,color){
  return `<div class="card card-hover kpi-detail" style="border-left:4px solid ${color}">
    <div class="icon-row"><i class="fa-solid ${icon}" style="color:${color}"></i>${dlt||''}</div>
    <div class="val">${val}</div>
    <div class="lbl">${title}</div>
    ${prevVal!==null&&prevVal!==undefined?`<div style="font-size:9px;color:#94a3b8;margin-top:4px;border-top:1px solid #f1f5f9;padding-top:4px">${prevLabel()}: <b>${prevVal}</b></div>`:''}
  </div>`;
}

function getEscalaDia(ddmm) {
  return ESCALA[ddmm] || { rotina:[], plantao:[], folga:[] };
}

function diaTemDado(ddmm) {
  for (let k in consolidatedIndicators) {
    if ((consolidatedIndicators[k].byDate[ddmm] || 0) > 0) return true;
  }
  return false;
}

function getDiasAlerta() {
  const m = parseInt(selMonthNum, 10);
  const days = m===2?28:([4,6,9,11].includes(m)?30:31);
  const hoje = new Date();
  const alertas = [];
  for (let d=1; d<=days; d++) {
    const ddmm = String(d).padStart(2,'0') + '/' + String(m).padStart(2,'0');
    const dataFull = new Date(2026, m-1, d);
    if (dataFull > hoje) continue;
    const esc = getEscalaDia(ddmm);
    const temEscala = esc.rotina.length > 0 || esc.plantao.length > 0;
    if (temEscala && !diaTemDado(ddmm)) alertas.push(ddmm);
  }
  return alertas;
}

function updateEscalaBadge() {
  const alertas = getDiasAlerta();
  const badge = document.getElementById('escala-badge');
  if (!badge) return;
  if (alertas.length > 0) {
    badge.style.display = 'flex'; badge.innerText = alertas.length;
  } else {
    badge.style.display = 'none';
  }
}

function renderEscalaTab(cont) {
  const m = parseInt(selMonthNum, 10);
  const days = m===2?28:([4,6,9,11].includes(m)?30:31);
  const hoje = new Date();
  const alertas = getDiasAlerta();
  const mesNome = MONTHS.find(x=>x.n===selMonthNum)?.l || selMonth;

  let html = `<div class="section-hdr mb12"><i class="fa-solid fa-users"></i>ESCALA — ${mesNome.toUpperCase()}</div>`;

  if (alertas.length > 0) {
    html += `<div class="alert-banner"><i class="fa fa-triangle-exclamation" style="font-size:16px;flex-shrink:0;margin-top:1px"></i>
      <span>${alertas.length} dia(s) com colaboradores escalados mas <b>sem indicadores preenchidos</b>:&nbsp;
      ${alertas.map(d=>`<b>${d}</b>`).join('&nbsp; ')}</span></div>`;
  } else {
    html += `<div class="ok-banner"><i class="fa fa-circle-check" style="font-size:15px"></i> Todos os dias com escala estão com indicadores preenchidos ✓</div>`;
  }

  html += `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:10px">`;

  for (let d=1; d<=days; d++) {
    const ddmm = String(d).padStart(2,'0') + '/' + String(m).padStart(2,'0');
    const esc = getEscalaDia(ddmm);
    const dataFull = new Date(2026, m-1, d);
    const futuro = dataFull > hoje;
    const temDado = diaTemDado(ddmm);
    const temEscala = esc.rotina.length > 0 || esc.plantao.length > 0;
    const isAlerta = !futuro && temEscala && !temDado;
    const dow = ['DOM','SEG','TER','QUA','QUI','SEX','SÁB'][dataFull.getDay()];
    const cardClass = isAlerta ? 'alerta' : (temDado ? 'ok' : 'folga');

    html += `<div class="escala-day-card ${cardClass}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <span style="font-weight:700;font-size:13px">${ddmm} <span style="color:#94a3b8;font-weight:400;font-size:10px">${dow}</span></span>
        <div>
          ${isAlerta ? '<span class="badge-turno badge-alerta"><i class="fa fa-triangle-exclamation"></i> SEM DADO</span>' : ''}
          ${futuro ? '<span style="font-size:9px;color:#94a3b8;font-style:italic">futuro</span>' : ''}
          ${!futuro && temDado ? '<span style="font-size:9px;color:#16a34a;font-weight:700">✓ preenchido</span>' : ''}
        </div>
      </div>`;

    if (esc.rotina.length > 0) {
      html += `<div style="margin-bottom:6px"><span class="badge-turno badge-r">Rotina</span><br>`;
      esc.rotina.forEach(p => {
        html += `<div style="padding:2px 0;display:flex;justify-content:space-between"><span class="escala-nome">${p.nome}</span><span class="escala-cargo">${p.cargo}</span></div>`;
      });
      html += `</div>`;
    }
    if (esc.plantao.length > 0) {
      html += `<div><span class="badge-turno badge-24">Plantão 24h</span><br>`;
      esc.plantao.forEach(p => {
        html += `<div style="padding:2px 0;display:flex;justify-content:space-between"><span class="escala-nome">${p.nome}</span><span class="escala-cargo">${p.cargo}</span></div>`;
      });
      html += `</div>`;
    }
    if (!temEscala) {
      html += `<div style="font-size:9px;color:#94a3b8;font-style:italic">Sem escala registrada</div>`;
    }
    html += `</div>`;
  }
  html += `</div>`;
  cont.innerHTML = html;
}
